name: npm-publish-manual

on:
  workflow_dispatch:
    inputs:
      version:
        description: "npm 版本（如 0.1.3），须与仓库 tag v* / GitHub Release 一致"
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm (manual)
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    defaults:
      run:
        working-directory: packages/cli-agent-gateway
    steps:
      - uses: actions/checkout@v4

      - name: Verify NPM_TOKEN secret
        shell: bash
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::Repository secret NPM_TOKEN is missing or empty."
            echo "Fix: GitHub repo → Settings → Secrets → Actions → NPM_TOKEN"
            exit 1
          fi
          echo "NPM_TOKEN is set (${#NODE_AUTH_TOKEN} chars)"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org
          always-auth: true

      - name: Sync package version from input
        shell: bash
        run: |
          VER="${{ inputs.version }}"
          VER="${VER#v}"
          npm version "$VER" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        run: npm publish --access public
